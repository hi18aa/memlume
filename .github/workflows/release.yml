name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  verify-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10.30.3
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Install Hermes loader smoke runtime
        run: python -m pip install --disable-pip-version-check --no-cache-dir --no-deps "hermes-agent @ git+https://github.com/NousResearch/hermes-agent.git@a9cc17fd80648bfee0d0b677fa9ea91421f329fc" "PyYAML==6.0.3"
      - run: pnpm install --frozen-lockfile
      - name: Verify clean TypeScript workspace
        shell: bash
        run: |
          artifacts="$(find apps packages -mindepth 2 -maxdepth 2 \( -type d -name dist -o -type f -name '*.tsbuildinfo' \) -print)"
          if [[ -n "$artifacts" ]]; then
            printf 'Unexpected pre-existing TypeScript build artifacts:\n%s\n' "$artifacts"
            exit 1
          fi
      - run: pnpm typecheck
      - name: Verify project-reference outputs
        shell: bash
        run: |
          test -f packages/backup/dist/index.d.ts
          test -f packages/backup/dist/tsconfig.tsbuildinfo
          test -f apps/cli/dist/index.js
      - run: pnpm test
        env:
          HERMES_PYTHON: python
      - run: pnpm test:e2e
      - run: pnpm build
      - run: pnpm benchmark:retrieval
      - run: git archive --format=tar.gz --output=memlume-${GITHUB_REF_NAME}.tar.gz HEAD
      - uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          generate_release_notes: true
          files: memlume-${{ github.ref_name }}.tar.gz
