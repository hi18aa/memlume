    <path id="wordmark-l" d="M394 60v72"/>
    <path id="wordmark-u" d="M416 86v31c0 10 6 15 15 15s16-6 16-15V86"/>
    <path id="wordmark-finalm" d="M470 132V86c7-7 19-6 24 4 6-10 19-10 26-4v46"/>
    <path id="wordmark-laste" d="M542 109h38c0-15-8-25-19-25s-19 10-19 25c0 14 8 23 20 23 8 0 14-3 19-8"/>
  </g>
</svg>
