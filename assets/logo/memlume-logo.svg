    <path d="M78 23 78 78M130 61 78 78M110 122 78 78M46 122 78 78M26 61 78 78" fill="none" stroke="#0B1F33" stroke-width="7" stroke-linecap="round"/>
    <path d="M78 23 78 78M130 61 78 78M110 122 78 78M46 122 78 78M26 61 78 78" fill="none" stroke="#27C2D8" stroke-width="3" stroke-linecap="round"/>
    <circle cx="78" cy="78" r="31" fill="url(#core-light)"/>
    <path d="M78 56v44M56 78h44" stroke="#DFFCFF" stroke-width="5" stroke-linecap="round" opacity=".86"/>
    <circle cx="78" cy="23" r="11" fill="none" stroke="#DFFCFF" stroke-width="10"/>
    <circle cx="78" cy="23" r="11" fill="url(#node-light)" stroke="#0B1F33" stroke-width="4"/>
    <circle cx="130" cy="61" r="11" fill="none" stroke="#DFFCFF" stroke-width="10"/>
    <circle cx="130" cy="61" r="11" fill="#27C2D8" stroke="#0B1F33" stroke-width="4"/>
    <circle cx="110" cy="122" r="11" fill="none" stroke="#DFFCFF" stroke-width="10"/>
    <circle cx="110" cy="122" r="11" fill="#F4B75B" stroke="#0B1F33" stroke-width="4"/>
    <circle cx="46" cy="122" r="11" fill="none" stroke="#DFFCFF" stroke-width="10"/>
    <circle cx="46" cy="122" r="11" fill="#60DCE4" stroke="#0B1F33" stroke-width="4"/>
    <circle cx="26" cy="61" r="11" fill="none" stroke="#DFFCFF" stroke-width="10"/>
    <circle cx="26" cy="61" r="11" fill="#27C2D8" stroke="#0B1F33" stroke-width="4"/>
    <path d="M116 138a68 68 0 0 0 24-27" fill="none" stroke="#0B1F33" stroke-width="9" stroke-linecap="round"/>
    <path d="M116 138a68 68 0 0 0 24-27" fill="none" stroke="#F4B75B" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Original geometric glyph paths: permanent mist halos make the mark background-independent. -->
  <g fill="none" stroke="#DFFCFF" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path data-role="wordmark-halo" d="M196 132V60l22 44 22-44v72"/>
