  </g>
  <g fill="none" stroke="#0B1F33" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" aria-label="Memlume">
    <path id="wordmark-majorm" d="M196 132V60l22 44 22-44v72"/>
    <path id="wordmark-firste" d="M262 109h38c0-15-8-25-19-25s-19 10-19 25c0 14 8 23 20 23 8 0 14-3 19-8"/>
